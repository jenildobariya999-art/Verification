<!DOCTYPE html>
<html>
<head>
<title>Verification</title>
</head>

<body>

<h2>Verification Page</h2>

<p id="uid"></p>

<script>
const params = new URLSearchParams(window.location.search)
const uid = params.get("uid")

document.getElementById("uid").innerText = "User ID: " + uid
</script>

</body>
</html>
