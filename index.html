<!DOCTYPE html>
<html>
<head>
<title>Device Verification</title>
</head>

<body>

<h2>Verify Your Device</h2>

<button onclick="verify()">Verify</button>

<p id="msg"></p>

<script>

function fingerprint(){
return navigator.userAgent + screen.width + screen.height + navigator.platform
}

const params = new URLSearchParams(window.location.search)
const uid = params.get("uid")

function verify(){

fetch("/api/verify?uid="+uid+"&fp="+btoa(fingerprint()))

.then(res=>res.json())

.then(data=>{

if(data.status==="verified"){

document.getElementById("msg").innerHTML =
`<h3>Verified ✅</h3>
<a href="https://t.me/YOUR_BOT_USERNAME?start=verified">
Back To Bot
</a>`

}

else{

document.getElementById("msg").innerHTML =
"<h3>Same Device Detected ❌</h3>"

}

})

}

</script>

</body>
</html>
