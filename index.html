<!DOCTYPE html>
<html>
<head>
<title>Verification</title>
</head>

<body>

<h2>Device Verification</h2>

<button onclick="verify()">Verify Device</button>

<script>

const params = new URLSearchParams(window.location.search)
const uid = params.get("uid")

function verify(){

 fetch("/api/verify?uid="+uid)
 .then(r=>r.json())
 .then(data=>{

  if(data.status=="ok"){
   document.body.innerHTML =
   `<h3>Verified ✅</h3>
   <a href="https://t.me/YOUR_BOT_USERNAME?start=verified">Back to Bot</a>`
  }

  else{
   document.body.innerHTML =
   `<h3>Same Device Detected ❌</h3>`
  }

 })

}

</script>

</body>
</html>
