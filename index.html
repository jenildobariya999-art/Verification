<!DOCTYPE html>
<html>
<head>
<title>Verification</title>
</head>

<body>

<h2>Telegram Verification</h2>

<script>

const params = new URLSearchParams(window.location.search)
const uid = params.get("uid")

if(!uid){
 document.body.innerHTML="User ID missing"
}

fetch("/api/verify?uid="+uid)
.then(res=>res.json())
.then(data=>{
 document.body.innerHTML = `
 <h3>Verification Successful</h3>
 <p>User: ${data.user}</p>
 <p>Device ID: ${data.device}</p>
 `
})

</script>

</body>
</html>
