<!DOCTYPE html>
<html>
<head>
  <title>Verification</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="container">

  <div id="scan">
    <h2>Verifying Device</h2>
    <p>Establishing secure handshake...</p>

    <div class="progress">
      <div id="bar"></div>
    </div>

    <p id="percent">0%</p>
  </div>

  <div id="success" class="hidden">
    <h1 class="green">✔ Verified Successfully</h1>
    <button onclick="closeApp()">CONTINUE TO BOT</button>
  </div>

  <div id="fail" class="hidden">
    <h1 class="red">❌ Verification Failed</h1>
    <p>Multiple devices detected</p>
    <button onclick="closeApp()">CONTINUE</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
