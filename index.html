<!DOCTYPE html>
<html>
<head>
<title>Verification</title>
</head>
<body>

<h2 id="status">🔍 Verifying Device...</h2>

<script>
const params = new URLSearchParams(window.location.search);
const user_id = params.get("id");
const token = params.get("token");

// Fingerprint basic
function getFingerprint() {
    return navigator.userAgent + 
           screen.width + 
           screen.height + 
           navigator.platform;
}

const fingerprint = getFingerprint();

fetch("https://web-production-155.up.railway.app/verify", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        user_id: user_id,
        token: token,
        fingerprint: fingerprint
    })
})
.then(res => res.json())
.then(data => {
    if(data.status === "success"){
        document.getElementById("status").innerHTML = "✅ Verified Successfully!";
    } else {
        document.getElementById("status").innerHTML = "❌ " + data.reason;
    }
})
.catch(err => {
    document.getElementById("status").innerHTML = "⚠️ Server Error!";
});
</script>

</body>
</html>
