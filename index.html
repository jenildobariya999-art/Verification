<!DOCTYPE html>
<html>
<head>
<title>Verification</title>
</head>
<body>

<h2 id="status">🔍 Verifying...</h2>

<script>
const params = new URLSearchParams(window.location.search);
const user_id = params.get("id");

fetch("https://web-production-155.up.railway.app/verify", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        user_id: user_id
    })
})
.then(res => res.json())
.then(data => {
    if(data.status === "success"){
        document.getElementById("status").innerHTML = "✅ Verified Successfully!";
    } else {
        document.getElementById("status").innerHTML = "❌ Verification Failed!";
    }
})
.catch(err => {
    document.getElementById("status").innerHTML = "⚠️ Server Error!";
});
</script>

</body>
</html>
