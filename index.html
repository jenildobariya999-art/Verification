<!DOCTYPE html>
<html>
<head>
  <title>Device Verification</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="container">

  <!-- TOP USER -->
  <div class="header">
    <div>
      <h3 id="name">User</h3>
      <p id="uid">ID: ---</p>
    </div>
    <span id="status" class="badge scanning">SCANNING</span>
  </div>

  <!-- SCAN -->
  <div id="scanBox">
    <div class="scan-circle">
      <div class="pulse"></div>
    </div>

    <h2>Verifying Device</h2>
    <p>Scanning security parameters...</p>

    <div class="progress">
      <div id="bar"></div>
    </div>

    <span id="percent">0%</span>
  </div>

  <!-- RESULT -->
  <div id="resultBox" class="hidden">
    <div id="icon"></div>
    <h2 id="title"></h2>
    <p id="desc"></p>

    <button onclick="closeApp()">CONTINUE</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
